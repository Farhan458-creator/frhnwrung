<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Warung Ganteng</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    scroll-behavior: smooth;
}

body {
    font-family: 'Poppins', sans-serif;
    background: #0f0f0f;
    color: white;
}

/* NAVBAR */
nav {
    position: fixed;
    width: 100%;
    padding: 15px;
    text-align: center;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(10px);
    z-index: 1000;
}

nav a {
    color: white;
    margin: 0 15px;
    text-decoration: none;
    transition: 0.3s;
}

nav a:hover {
    color: orange;
}

/* HERO */
header {
    height: 100vh;
    background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.9)),
    url('https://images.unsplash.com/photo-1504674900247-0877df9cc836') center/cover;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
}

header h1 {
    font-size: 65px;
    animation: fadeIn 2s;
}

header p {
    margin-top: 10px;
    color: #ccc;
}

/* BUTTON */
.btn {
    margin-top: 20px;
    display: inline-block;
    padding: 12px 30px;
    background: orange;
    color: black;
    border-radius: 30px;
    text-decoration: none;
    transition: 0.3s;
}

.btn:hover {
    background: white;
}

/* SECTION */
section {
    padding: 80px 20px;
    text-align: center;
}

/* MENU */
.menu {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 25px;
}

.card {
    background: #1c1c1c;
    border-radius: 15px;
    width: 230px;
    overflow: hidden;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-10px);
    box-shadow: 0 10px 30px rgba(255,165,0,0.4);
}

.card img {
    width: 100%;
    height: 150px;
    object-fit: cover;
}

.card h3 {
    margin: 10px;
}

.card p {
    color: orange;
    margin-bottom: 10px;
}

/* CONTACT */
#contact p {
    margin: 5px;
}

/* FOOTER */
footer {
    background: black;
    padding: 20px;
    text-align: center;
    color: #aaa;
}

/* ANIMATION */
@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}
</style>

</head>
<body>

<!-- NAV -->
<nav>
    <a href="#home">Home</a>
    <a href="#menu">Menu</a>
    <a href="#contact">Kontak</a>
</nav>

<!-- HERO -->
<header id="home">
    <div>
        <h1>🍽️ Warung Ganteng</h1>
        <p>Makanan enak, harga santai, vibes premium 😎</p>
        <a href="#menu" class="btn">Lihat Menu</a>
    </div>
</header>

<!-- MENU -->
<section id="menu">
    <h2>Menu Favorit</h2>
    <br>

    <div class="menu">

        <div class="card">
            <img src="nasi-goreng-kencur-kemangi.jpg">
            <h3>Nasi Goreng</h3>
            <p>Rp 20.000</p>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092">
            <h3>Ayam Bakar</h3>
            <p>Rp 25.000</p>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1550547660-d9450f859349">
            <h3>Burger</h3>
            <p>Rp 18.000</p>
        </div>

    </div>
</section>

<!-- CONTACT -->
<section id="contact">
    <h2>Kontak</h2>
    <br>
    <p>📍 Bandung, Jawa Barat</p>
    <p>📞 087543245780</p>
    <a href="https://wa.me/6287543245780" class="btn">Order WhatsApp</a>
</section>

<!-- FOOTER -->
<footer>
    <p>© 2026 Warung Ganteng</p>
</footer>

</body>
</html>
